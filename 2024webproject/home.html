<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: orange;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            font-size: 24px;
            padding-left: 15px;
        }
        .nav-menu {
            background-color: orange;
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
            position: relative;
            margin-bottom: 30px;
        }
        .nav-menu a {
            color: #ffffff;
            margin-left: 20px;
            padding-right: 30px;
            font-size: 20px;
            text-decoration: none;
        }
        .body-content {
            display: flex;
            flex-direction: row;
            background-color: #ffffff;
            color: #ffffff;
            flex: 1;
        }
        .sidebar {
            width: 250px;
            background-color: orange;
            flex-direction: column;
            margin-right: 2rem;
        }
        .map-content {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background-color: orange;
            justify-content: flex-end;
            flex: 1; /* 추가된 부분 */
        }
        .map-content img {
            max-width: 100%; /* 변경된 부분 */
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>HOME</h1>
    </header>
    <nav class="nav-menu">
        <div id="random-food">
            나는 오늘 <span id="random-food_item"></span>을 먹을까
            <button onclick="generateRandomFood()">음식 추천받기</button>
        </div>
    
        <div class="menu-item" style="position: relative">
            <a href="list.html">나의 기록</a>
        </div>
    </nav>
    <div class="body-content">
        <aside class="sidebar">
            <h2>To eat list</h2>
            <input type="text" id="new-item" placeholder="음식 입력">
            <button onclick="addItem()">추가</button>
            <ul id="item-list"></ul>
        </aside>
        <div class="map-content">
            <img src="map.jpg" alt="숙대맛집 지도">
        </div>
    </div>
    <script>
        function generateRandomFood() {
            // 랜덤 리스트 생성
            const foodList = ["피자", "햄버거", "치킨", "초밥", "파스타"];
            
            // 랜덤으로 항목 선택
            const randomFood = foodList[Math.floor(Math.random() * foodList.length)];
            
            // 문구 생성
            const randomMessage = `${randomFood}`;
            
            // 문구를 HTML에 삽입
            document.getElementById("random-food_item").innerText = randomMessage;
        }

        function addItem() {
            const newItem = document.getElementById('new-item').value;
            if (newItem.trim() !== "") {
                const li = document.createElement('li');
                li.innerText = newItem;
                li.appendChild(createDeleteButton());
                document.getElementById('item-list').appendChild(li);
                document.getElementById('new-item').value = '';
            }
        }

        function createDeleteButton() {
            const deleteBtn = document.createElement('button');
            deleteBtn.innerText = '삭제';
            deleteBtn.onclick = function() {
                const li = this.parentElement;
                li.parentElement.removeChild(li);
            };
            return deleteBtn;
        }
    </script>
</body>
</html>
